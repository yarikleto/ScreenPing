<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.telegram.org">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair; }
    body { background: #000; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .hint {
      position: absolute; top: 26px; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; font-weight: 500; letter-spacing: 0.2px;
      padding: 11px 20px; border-radius: 999px;
      background: rgba(20, 20, 30, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="hint">Drag to select region. Press Esc to cancel.</div>
  <canvas id="canvas"></canvas>
  <script src="overlay.js"></script>
</body>
</html>
